<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>管理后台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; color: #333; line-height: 1.5; display: flex; }
    .sidebar { width: 140px; background: #F9F9F9; border-right: 1px solid #EAEAEA; padding: 20px 12px; flex-shrink: 0; }
    .sidebar .item { padding: 8px 0; cursor: pointer; }
    .sidebar .item.active { font-weight: 600; }
    .main { flex: 1; padding: 24px; min-width: 0; }
    .main h2 { margin: 0 0 20px; font-weight: 600; font-size: 18px; }
    .list { border: none; width: 100%; }
    .list th, .list td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #EAEAEA; }
    .list th { font-weight: 600; }
    .list tr:hover { background: #F9F9F9; }
    .btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px 8px; }
    .btn.approve { color: #0a0; }
    .btn.reject { color: #c00; }
    .btn.mute { color: #f57c00; }
    .btn.ban { color: #c00; }
    .btn:hover { text-decoration: underline; }
    .card { margin-bottom: 24px; }
    .error { color: #c00; margin-top: 12px; }
    .login-prompt { padding: 24px; }
    .login-prompt input { padding: 8px 12px; margin-right: 8px; border: 1px solid #EAEAEA; border-radius: 6px; }
    .login-prompt button { padding: 8px 16px; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="item active" data-page="users">用户审核</div>
    <div class="item" data-page="all-users">所有用户</div>
    <div class="item" data-page="status">系统状态</div>
  </aside>
  <main class="main">
    <div id="users-page">
      <h2>待审核用户</h2>
      <div id="login-prompt" class="login-prompt">
        <input type="text" id="admin-user" placeholder="管理员账号">
        <input type="password" id="admin-pwd" placeholder="密码">
        <button type="button" id="admin-login">登录</button>
        <div class="error" id="login-error"></div>
      </div>
      <div id="content" style="display:none;">
        <table class="list" id="user-table">
          <thead><tr><th>用户名</th><th>UserId</th><th></th></tr></thead>
          <tbody id="user-tbody"></tbody>
        </table>
        <div class="error" id="api-err"></div>
      </div>
    </div>
    <div id="all-users-page" style="display:none;">
      <h2>所有用户（禁言 / 封禁）</h2>
      <div id="all-users-content" style="display:none;">
        <table class="list" id="all-users-table">
          <thead><tr><th>用户名</th><th>UserId</th><th>状态</th><th>操作</th></tr></thead>
          <tbody id="all-users-tbody"></tbody>
        </table>
        <div class="error" id="all-users-err"></div>
      </div>
    </div>
    <div id="status-page" style="display:none;">
      <h2>系统状态</h2>
      <p>运行正常。</p>
    </div>
  </main>
  <script>
    (function() {
      var API_BASE = ''; // 与 index 一致，同源可留空
      let token = '';
      const loginPrompt = document.getElementById('login-prompt');
      const content = document.getElementById('content');
      const userTbody = document.getElementById('user-tbody');
      const apiErr = document.getElementById('api-err');
      const loginErr = document.getElementById('login-error');
      const adminUser = document.getElementById('admin-user');
      const adminPwd = document.getElementById('admin-pwd');
      document.getElementById('admin-login').addEventListener('click', async function() {
        loginErr.textContent = '';
        var user = adminUser.value.trim();
        var pwd = adminPwd.value;
        if (!user || !pwd) { loginErr.textContent = '请输入账号和密码'; return; }
        try {
          const res = await fetch(API_BASE + '/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: user, password: pwd }) });
          const json = await res.json();
          if (json.token) { token = json.token; loginPrompt.style.display = 'none'; content.style.display = 'block'; document.getElementById('all-users-content').style.display = 'block'; loadUsers(); loadAllUsers(); }
          else loginErr.textContent = json.error || '登录失败';
        } catch (e) {
          loginErr.textContent = '网络错误，请确认服务已启动';
        }
      });
      async function loadUsers() {
        apiErr.textContent = '';
        const res = await fetch('/api/admin/users?status=PENDING', { headers: { 'Authorization': 'Bearer ' + token } });
        const json = await res.json();
        if (res.status === 403) { apiErr.textContent = '需要管理员权限'; return; }
        if (!res.ok) { apiErr.textContent = json.error || '加载失败'; return; }
        const users = json.users || [];
        userTbody.innerHTML = users.map(function(u) {
          return '<tr><td>' + (u.username || '') + '</td><td>' + u.userId + '</td><td><button class="btn approve" data-userid="' + u.userId + '">通过</button> <button class="btn reject" data-userid="' + u.userId + '">拒绝</button></td></tr>';
        }).join('');
        userTbody.querySelectorAll('.btn.approve').forEach(function(btn) {
          btn.addEventListener('click', function() { approve(parseInt(btn.dataset.userid, 10)); });
        });
        userTbody.querySelectorAll('.btn.reject').forEach(function(btn) {
          btn.addEventListener('click', function() { reject(parseInt(btn.dataset.userid, 10)); });
        });
      }
      async function approve(userId) {
        const res = await fetch('/api/admin/approve', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ userId: userId }) });
        if (res.ok) loadUsers(); else apiErr.textContent = '操作失败';
      }
      async function reject(userId) {
        const res = await fetch('/api/admin/reject', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ userId: userId }) });
        if (res.ok) loadUsers(); else apiErr.textContent = '操作失败';
      }
      const allUsersTbody = document.getElementById('all-users-tbody');
      const allUsersErr = document.getElementById('all-users-err');
      async function loadAllUsers() {
        if (!token) return;
        allUsersErr.textContent = '';
        const res = await fetch('/api/admin/all-users', { headers: { 'Authorization': 'Bearer ' + token } });
        const json = await res.json();
        if (res.status === 403) { allUsersErr.textContent = '需要管理员权限'; return; }
        if (!res.ok) { allUsersErr.textContent = json.error || '加载失败'; return; }
        const users = json.users || [];
        allUsersTbody.innerHTML = users.map(function(u) {
          var status = u.status || '';
          var muteBtn = status === 'MUTED' ? '<button class="btn unmute" data-userid="' + u.userId + '">解禁</button>' : '<button class="btn mute" data-userid="' + u.userId + '">禁言</button>';
          var banBtn = status === 'BANNED' ? '<button class="btn unban" data-userid="' + u.userId + '">解封</button>' : '<button class="btn ban" data-userid="' + u.userId + '">封禁</button>';
          return '<tr><td>' + (u.username || '') + '</td><td>' + u.userId + '</td><td>' + status + '</td><td>' + muteBtn + ' ' + banBtn + '</td></tr>';
        }).join('');
        allUsersTbody.querySelectorAll('.btn.mute').forEach(function(btn) {
          btn.addEventListener('click', function() { adminAction(parseInt(btn.dataset.userid, 10), 'MUTE'); });
        });
        allUsersTbody.querySelectorAll('.btn.unmute').forEach(function(btn) {
          btn.addEventListener('click', function() { adminAction(parseInt(btn.dataset.userid, 10), 'UNMUTE'); });
        });
        allUsersTbody.querySelectorAll('.btn.ban').forEach(function(btn) {
          btn.addEventListener('click', function() { adminAction(parseInt(btn.dataset.userid, 10), 'BAN'); });
        });
        allUsersTbody.querySelectorAll('.btn.unban').forEach(function(btn) {
          btn.addEventListener('click', function() { adminAction(parseInt(btn.dataset.userid, 10), 'UNBAN'); });
        });
      }
      async function adminAction(userId, action) {
        const res = await fetch('/api/admin/action', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ userId: userId, action: action }) });
        if (res.ok) loadAllUsers(); else allUsersErr.textContent = '操作失败';
      }
      document.querySelectorAll('.sidebar .item').forEach(function(el) {
        el.addEventListener('click', function() {
          document.querySelectorAll('.sidebar .item').forEach(function(x) { x.classList.remove('active'); });
          el.classList.add('active');
          var page = el.dataset.page;
          document.getElementById('users-page').style.display = page === 'users' ? 'block' : 'none';
          document.getElementById('all-users-page').style.display = page === 'all-users' ? 'block' : 'none';
          document.getElementById('status-page').style.display = page === 'status' ? 'block' : 'none';
          if (page === 'all-users') loadAllUsers();
        });
      });
    })();
  </script>
</body>
</html>
