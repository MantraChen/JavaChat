<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>申请注册</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #F5F5F7; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 15px; color: #333; line-height: 1.5; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; width: 100%; max-width: 360px; padding: 40px 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .card h1 { margin: 0 0 28px; font-weight: 600; font-size: 22px; text-align: center; }
    .card input { width: 100%; padding: 12px 14px; margin-bottom: 16px; border: 1px solid #EAEAEA; border-radius: 8px; font-size: 15px; outline: none; }
    .card input:focus { border-color: #333; }
    .card button { width: 100%; padding: 12px; margin-top: 8px; background: #333; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; }
    .card button:hover { background: #000; }
    .card button:disabled { opacity: 0.6; cursor: not-allowed; }
    .card .error { margin-top: 12px; color: #c00; font-size: 13px; }
    .card .success { margin-top: 16px; color: #333; font-size: 14px; }
    .card .success a { color: #333; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <h1>申请注册</h1>
    <input type="text" id="username" placeholder="用户名" autocomplete="username">
    <input type="password" id="password" placeholder="密码" autocomplete="new-password">
    <button type="button" id="btn">申请注册</button>
    <div class="error" id="err"></div>
    <div class="success" id="ok" style="display:none;"></div>
  </div>
  <script>
    (function() {
      const username = document.getElementById('username');
      const password = document.getElementById('password');
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');
      const ok = document.getElementById('ok');
      btn.addEventListener('click', async function() {
        const u = (username.value || '').trim();
        const p = password.value || '';
        err.textContent = '';
        ok.style.display = 'none';
        if (!u || !p) { err.textContent = '请输入用户名和密码'; return; }
        btn.disabled = true;
        try {
          const res = await fetch('/api/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: u, password: p }) });
          const json = await res.json();
          if (res.ok && json.ok) {
            ok.innerHTML = '申请已提交，等待管理员审核。<br><a href="/">返回登录</a>';
            ok.style.display = 'block';
            username.value = '';
            password.value = '';
          } else {
            err.textContent = json.error || '注册失败';
          }
        } catch (e) {
          err.textContent = '网络错误';
        }
        btn.disabled = false;
      });
    })();
  </script>
</body>
</html>
