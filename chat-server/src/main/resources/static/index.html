<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #F5F5F7;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      color: #333333;
      line-height: 1.5;
    }

    /* ---------- 登录 ---------- */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      background: #FFFFFF;
      width: 100%;
      max-width: 360px;
      padding: 40px 32px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .login-card h1 {
      margin: 0 0 28px;
      font-weight: 600;
      font-size: 22px;
      text-align: center;
    }
    .login-card input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 16px;
      border: 1px solid #EAEAEA;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }
    .login-card input:focus {
      border-color: #333333;
    }
    .login-card button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      background: #333333;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
    }
    .login-card button:hover { background: #000000; }
    .login-card .error {
      margin-top: 12px;
      color: #c00;
      font-size: 13px;
    }
    .login-card .login-links {
      margin-top: 20px;
      text-align: center;
      font-size: 14px;
    }
    .login-card .login-links a {
      color: #333;
      text-decoration: none;
      margin: 0 12px;
    }
    .login-card .login-links a:hover { text-decoration: underline; }

    /* ---------- 聊天（默认隐藏）：整屏固定，仅消息区内部滚动，类似微信 ---------- */
    #chat-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    #chat-screen.visible { display: flex; }

    .chat-header {
      flex-shrink: 0;
      background: #FFFFFF;
      padding: 14px 20px;
      font-weight: 600;
      border-bottom: 1px solid #EAEAEA;
    }

    .chat-layout {
      display: flex;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }
    .chat-sidebar {
      flex-shrink: 0;
      width: 200px;
      background: #F9F9F9;
      border-right: 1px solid #EAEAEA;
      padding: 12px 0;
      font-size: 13px;
      color: #666;
      overflow-y: auto;
    }
    .chat-sidebar .title { font-weight: 600; margin-bottom: 8px; color: #333; padding: 0 16px; }
    .chat-sidebar .session-item { padding: 10px 16px; cursor: pointer; border-left: 3px solid transparent; }
    .chat-sidebar .session-item:hover { background: #f0f0f0; }
    .chat-sidebar .session-item.active { background: #EAEAEA; border-left-color: #333; font-weight: 500; }

    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #FFFFFF;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    /* 消息区单独成块，仅此区域滚动，不拉长 body */
    .messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 20px 8px;
      display: flex;
      flex-direction: column;
    }
    .msg {
      max-width: 75%;
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.other {
      align-self: flex-start;
      background: #F1F1F1;
      color: #333333;
    }
    .msg.self {
      align-self: flex-end;
      margin-left: 0;
      background: #333333;
      color: #FFFFFF;
    }
    .msg .sender { font-size: 12px; opacity: 0.85; margin-bottom: 4px; }
    .msg.self .sender { color: #e0e0e0; }
    .msg .msg-actions { margin-top: 6px; font-size: 12px; opacity: 0; transition: opacity 0.15s; }
    .msg:hover .msg-actions { opacity: 1; }
    .msg .msg-actions a { color: #666; cursor: pointer; margin-right: 10px; text-decoration: none; }
    .msg .msg-actions a:hover { text-decoration: underline; }
    .msg.self .msg-actions a { color: rgba(255,255,255,0.9); }
    .msg.recalled .msg-text { color: #999; font-style: italic; }
    .msg.mention { background: #FFF9C4 !important; }
    .msg .quote-bar { margin-bottom: 6px; padding: 6px 8px; border-left: 2px solid #ccc; background: #f5f5f5; border-radius: 4px; font-size: 12px; color: #666; cursor: pointer; }
    .msg.self .quote-bar { background: rgba(255,255,255,0.2); border-left-color: #fff; color: #e0e0e0; }

    .quote-preview { padding: 8px 12px; margin-bottom: 8px; border-left: 2px solid #ccc; background: #F9F9F9; border-radius: 4px; font-size: 13px; color: #666; display: flex; justify-content: space-between; align-items: center; }
    .quote-preview .clear { cursor: pointer; color: #999; }
    .chat-input-wrap {
      flex-shrink: 0;
      border-top: 1px solid #EAEAEA;
      padding: 12px 20px 16px;
      background: #FFFFFF;
    }
    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .chat-input-row input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #EAEAEA;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
    }
    .chat-input-row input:focus { border-color: #333333; }
    .chat-input-row button {
      padding: 12px 20px;
      background: #333333;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .chat-input-row button:hover { background: #000000; }
    #mention-dropdown { position: absolute; bottom: 100%; left: 20px; right: 20px; margin-bottom: 4px; background: #fff; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-height: 160px; overflow-y: auto; display: none; z-index: 10; }
    #mention-dropdown.visible { display: block; }
    #mention-dropdown .item { padding: 8px 12px; cursor: pointer; font-size: 14px; }
    #mention-dropdown .item:hover, #mention-dropdown .item.selected { background: #f0f0f0; }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <h1>登录</h1>
      <input type="text" id="input-userid" placeholder="用户名（如 A、B、C 或已注册账号）" autocomplete="username">
      <input type="password" id="input-password" placeholder="Password" autocomplete="current-password">
      <button type="button" id="btn-login">登录</button>
      <div class="error" id="login-error"></div>
      <div class="login-links">
        <a href="register.html">注册新账号</a>
        <a href="admin.html">管理员登录</a>
      </div>
    </div>
  </div>

  <div id="chat-screen">
    <header class="chat-header" id="header-title">—</header>
    <div class="chat-layout">
      <aside class="chat-sidebar">
        <div class="title">会话</div>
        <div id="session-list"></div>
      </aside>
      <main class="chat-main">
        <div class="messages" id="messages"></div>
        <div class="chat-input-wrap" style="position:relative;">
          <div class="quote-preview" id="quote-preview" style="display:none;"><span id="quote-text"></span><span class="clear" id="quote-clear">×</span></div>
          <div id="mention-dropdown"></div>
          <div class="chat-input-row">
            <input type="text" id="input-msg" placeholder="输入消息，@ 提及他人，回车发送" autocomplete="off">
            <button type="button" id="btn-send">发送</button>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script>
    (function() {
      const API_BASE = '';
      const WS_URL = 'ws://' + location.host + '/ws';

      let token = '';
      let userId = '';
      let ws = null;
      let authenticated = false;

      // 最先绑定登录按钮，避免后续代码报错导致点击无反应
      var btnLoginEl = document.getElementById('btn-login');
      if (btnLoginEl) {
        btnLoginEl.addEventListener('click', function doLogin() {
          var inputUserid = document.getElementById('input-userid');
          var inputPassword = document.getElementById('input-password');
          var loginErrorEl = document.getElementById('login-error');
          var user = (inputUserid && inputUserid.value ? inputUserid.value : '').trim();
          var pass = inputPassword ? inputPassword.value : '';
          if (loginErrorEl) loginErrorEl.textContent = '';
          if (!user || !pass) {
            if (loginErrorEl) loginErrorEl.textContent = '请输入用户名和密码';
            return;
          }
          btnLoginEl.disabled = true;
          var url = (API_BASE || '') + '/api/login';
          if (!url.startsWith('http') && !url.startsWith('/')) url = '/' + url.replace(/^\/*/, '');
          fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: user, password: pass })
          }).then(function(res) {
            return res.json().then(function(json) {
              return { res: res, json: json };
            }).catch(function() {
              return { res: res, json: null };
            });
          }).then(function(o) {
            if (o.json && o.json.token) {
              token = o.json.token;
              userId = user;
              if (typeof Notification !== 'undefined' && Notification.permission === 'default') Notification.requestPermission();
              var ls = document.getElementById('login-screen');
              var cs = document.getElementById('chat-screen');
              var ht = document.getElementById('header-title');
              var inp = document.getElementById('input-msg');
              if (ls) ls.style.display = 'none';
              if (cs) cs.classList.add('visible');
              if (ht) ht.textContent = '公共大厅';
              if (inp) inp.focus();
              connectWebSocket();
            } else {
              var errEl = document.getElementById('login-error');
              if (errEl) errEl.textContent = (o.json && o.json.error) ? o.json.error : '登录失败';
            }
          }).catch(function(e) {
            var errEl = document.getElementById('login-error');
            if (errEl) errEl.textContent = '网络错误，请用 http://本机:9091 打开页面并确认服务已启动';
          }).then(function() {
            btnLoginEl.disabled = false;
          });
        });
      }

      const loginScreen = document.getElementById('login-screen');
      const chatScreen = document.getElementById('chat-screen');
      const inputUserid = document.getElementById('input-userid');
      const inputPassword = document.getElementById('input-password');
      const loginError = document.getElementById('login-error');
      const btnLogin = document.getElementById('btn-login');
      const headerTitleEl = document.getElementById('header-title');
      const messagesEl = document.getElementById('messages');
      const sessionListEl = document.getElementById('session-list');
      const inputMsg = document.getElementById('input-msg');
      const btnSend = document.getElementById('btn-send');
      var allMessages = [];
      var currentSessionId = 'PUBLIC';

      function sessionIdForMessage(m) {
        var r = m.receiverId;
        if (!r || r === '' || r === 'PUBLIC') return 'PUBLIC';
        return m.senderId === userId ? r : m.senderId;
      }

      function renderSessionList() {
        if (!sessionListEl) return;
        var ids = { 'PUBLIC': true };
        allMessages.forEach(function(item) {
          ids[item.sessionId] = true;
        });
        var order = ['PUBLIC'];
        Object.keys(ids).forEach(function(k) { if (k !== 'PUBLIC') order.push(k); });
        order.sort(function(a, b) { if (a === 'PUBLIC') return -1; if (b === 'PUBLIC') return 1; return a.localeCompare(b); });
        sessionListEl.innerHTML = order.map(function(sid) {
          var label = sid === 'PUBLIC' ? '公共大厅' : ('与 ' + sid + ' 私聊');
          var active = sid === currentSessionId ? ' active' : '';
          return '<div class="session-item' + active + '" data-session="' + sid + '">' + label + '</div>';
        }).join('');
        sessionListEl.querySelectorAll('.session-item').forEach(function(el) {
          el.addEventListener('click', function() {
            currentSessionId = el.getAttribute('data-session');
            if (headerTitleEl) headerTitleEl.textContent = currentSessionId === 'PUBLIC' ? '公共大厅' : ('与 ' + currentSessionId + ' 聊天中');
            sessionListEl.querySelectorAll('.session-item').forEach(function(x) { x.classList.remove('active'); });
            el.classList.add('active');
            renderCurrentSession();
          });
        });
      }

      function renderCurrentSession() {
        if (!messagesEl) return;
        messagesEl.innerHTML = '';
        allMessages.forEach(function(item) {
          if (item.sessionId === currentSessionId) appendMessageToDOM(item.data, item.isSelf);
        });
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function appendMessageToDOM(data, isSelf) {
        const div = document.createElement('div');
        div.className = 'msg ' + (isSelf ? 'self' : 'other');
        if (data.messageId) div.setAttribute('data-message-id', data.messageId);
        if (data.mentions && data.mentions.indexOf(userId) >= 0) div.classList.add('mention');
        const sender = document.createElement('div');
        sender.className = 'sender';
        sender.textContent = data.senderId || '—';
        if (!isSelf && data.senderId) {
          sender.style.cursor = 'pointer';
          sender.title = '点击发起私聊';
          sender.onclick = function() {
            currentSessionId = data.senderId;
            renderSessionList();
            if (headerTitleEl) headerTitleEl.textContent = '与 ' + currentSessionId + ' 聊天中';
            sessionListEl.querySelectorAll('.session-item').forEach(function(x) { x.classList.remove('active'); if (x.getAttribute('data-session') === currentSessionId) x.classList.add('active'); });
            renderCurrentSession();
          };
        }
        div.appendChild(sender);
        if (data.replyToId && (data.replyToUser || data.replyToContent)) {
          const q = document.createElement('div');
          q.className = 'quote-bar';
          q.textContent = (data.replyToUser ? data.replyToUser + ': ' : '') + (data.replyToContent || '');
          q.onclick = function() {
            const el = document.querySelector('.msg[data-message-id="' + data.replyToId + '"]');
            if (el) el.scrollIntoView({ behavior: 'smooth' });
          };
          div.appendChild(q);
        }
        const text = document.createElement('div');
        text.className = 'msg-text';
        if (data.isRecalled) {
          div.classList.add('recalled');
          text.textContent = (data.senderId || '') + ' 撤回了一条消息';
        } else {
          text.textContent = data.content || '';
        }
        div.appendChild(text);
        if (!data.isRecalled) {
          const actions = document.createElement('div');
          actions.className = 'msg-actions';
          const quoteLink = document.createElement('a');
          quoteLink.textContent = '引用';
          quoteLink.onclick = function() {
            var msgEl = quoteLink.closest('.msg');
            if (msgEl && msgEl.classList.contains('recalled')) return;
            pendingQuote = { id: data.messageId, user: data.senderId || '', content: (data.content || '').slice(0, 80) };
            quoteText.textContent = (data.senderId || '') + ': ' + (data.content || '').slice(0, 50);
            quotePreview.style.display = 'flex';
          };
          actions.appendChild(quoteLink);
          if (isSelf && ws && ws.readyState === WebSocket.OPEN) {
            const recallLink = document.createElement('a');
            recallLink.textContent = '撤回';
            recallLink.onclick = function() {
              ws.send(JSON.stringify({ type: 'RECALL', messageId: data.messageId }));
            };
            actions.appendChild(recallLink);
          }
          div.appendChild(actions);
        }
        messagesEl.appendChild(div);
      }

      function appendMessage(data, isSelf) {
        var sid = sessionIdForMessage(data);
        allMessages.push({ data: data, isSelf: isSelf, sessionId: sid });
        if (sid === currentSessionId) appendMessageToDOM(data, isSelf);
        if (sessionListEl && sid !== 'PUBLIC') renderSessionList();
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      let pendingQuote = null;
      const quotePreview = document.getElementById('quote-preview');
      const quoteText = document.getElementById('quote-text');
      const quoteClear = document.getElementById('quote-clear');
      if (quoteClear) quoteClear.addEventListener('click', function() { pendingQuote = null; if (quotePreview) quotePreview.style.display = 'none'; });

      function applyRecall(messageId, senderId) {
        var item = allMessages.find(function(x) { return String(x.data.messageId) === String(messageId); });
        if (item) item.data.isRecalled = true;
        var el = messagesEl.querySelector('.msg[data-message-id="' + String(messageId) + '"]');
        if (!el) return;
        el.classList.add('recalled');
        var text = el.querySelector('.msg-text');
        if (text) text.textContent = (senderId || '') + ' 撤回了一条消息';
        var actions = el.querySelector('.msg-actions');
        if (actions) actions.remove();
        if (pendingQuote && String(pendingQuote.id) === String(messageId)) {
          pendingQuote = null;
          if (quotePreview) quotePreview.style.display = 'none';
        }
      }

      function connectWebSocket() {
        ws = new WebSocket(WS_URL);
        ws.onopen = function() {
          ws.send(JSON.stringify({ type: 'auth', token: token }));
        };
        ws.onmessage = function(ev) {
          try {
            const data = JSON.parse(ev.data);
            if (data.type === 'auth_ok') {
              authenticated = true;
              allMessages = [];
              currentSessionId = 'PUBLIC';
              if (headerTitleEl) headerTitleEl.textContent = '公共大厅';
              messagesEl.innerHTML = '';
              ws.send(JSON.stringify({ type: 'sync', lastTimestamp: 0 }));
            } else if (data.type === 'auth_fail') {
              authenticated = false;
              if (headerTitleEl) headerTitleEl.textContent = '认证失败，请刷新页面重新登录';
            } else if (data.type === 'chat') {
              appendMessage(data, data.senderId === userId);
              if (data.mentions && data.mentions.indexOf(userId) >= 0 && document.hidden) {
                try { new Notification('新消息 @你', { body: (data.senderId || '') + ': ' + (data.content || '').slice(0, 50) }); } catch (e) {}
              }
            } else if (data.type === 'RECALL') {
              applyRecall(data.messageId, data.senderId);
            } else if (data.type === 'sync_result' && Array.isArray(data.messages)) {
              data.messages.forEach(function(m) {
                appendMessage(m, m.senderId === userId);
              });
              renderSessionList();
              var meMentioned = data.messages.some(function(m) { return m.mentions && m.mentions.indexOf(userId) >= 0; });
              if (meMentioned && document.hidden) { try { new Notification('有人 @你'); } catch (e) {} }
            } else if (data.type === 'error') {
              console.warn('Server error:', data.reason);
            }
          } catch (e) {
            console.warn('Parse message error', e);
          }
        };
        ws.onclose = function() {
          authenticated = false;
        };
        ws.onerror = function() {
          authenticated = false;
        };
      }

      if (inputPassword) inputPassword.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && btnLoginEl) btnLoginEl.click();
      });

      function parseMentions(text) {
        var m = text.match(/@(\w+)/g);
        return m ? m.map(function(x) { return x.slice(1); }) : [];
      }

      function sendChat() {
        const content = (inputMsg.value || '').trim();
        if (!content || !ws || ws.readyState !== WebSocket.OPEN || !authenticated) return;
        const payload = { type: 'chat', content: content, mentions: parseMentions(content) };
        if (currentSessionId && currentSessionId !== 'PUBLIC') payload.receiverId = currentSessionId;
        if (pendingQuote) {
          payload.replyToId = pendingQuote.id;
          payload.replyToUser = pendingQuote.user;
          payload.replyToContent = pendingQuote.content;
          pendingQuote = null;
          quotePreview.style.display = 'none';
        }
        ws.send(JSON.stringify(payload));
        inputMsg.value = '';
        inputMsg.focus();
      }

      btnSend.addEventListener('click', sendChat);

      var mentionDropdown = document.getElementById('mention-dropdown');
      var mentionCandidates = [];
      var mentionOnlineCache = null;
      var mentionStart = -1;
      var mentionSelectedIndex = 0;

      function openMentionDropdown(filter, atIndex) {
        if (atIndex == null || atIndex < 0) { mentionStart = -1; return; }
        mentionStart = atIndex;
        function show(list) {
          list = (list || []).filter(function(u) { return u !== userId; });
          mentionCandidates = list.filter(function(u) { return !filter || u.toLowerCase().indexOf(filter.toLowerCase()) >= 0; });
          mentionSelectedIndex = 0;
          renderMentionDropdown();
          mentionDropdown.classList.add('visible');
        }
        if (mentionOnlineCache) {
          show(mentionOnlineCache);
        } else {
          fetch((API_BASE || '') + '/api/online', { headers: { 'Authorization': 'Bearer ' + token } })
            .then(function(r) { return r.json(); })
            .then(function(json) {
              mentionOnlineCache = json.users || [];
              show(mentionOnlineCache);
            })
            .catch(function() { mentionDropdown.classList.remove('visible'); });
        }
      }

      function renderMentionDropdown() {
        mentionDropdown.innerHTML = '';
        mentionCandidates.forEach(function(u, i) {
          var div = document.createElement('div');
          div.className = 'item' + (i === mentionSelectedIndex ? ' selected' : '');
          div.textContent = u;
          div.onclick = function() { insertMention(u); };
          mentionDropdown.appendChild(div);
        });
        var sel = mentionDropdown.querySelector('.item.selected');
        if (sel) sel.scrollIntoView({ block: 'nearest' });
      }

      function insertMention(username) {
        if (mentionStart < 0) return;
        var val = inputMsg.value;
        var end = inputMsg.selectionStart;
        inputMsg.value = val.slice(0, mentionStart) + '@' + username + ' ' + val.slice(end);
        inputMsg.selectionStart = inputMsg.selectionEnd = mentionStart + username.length + 2;
        mentionDropdown.classList.remove('visible');
        mentionStart = -1;
      }

      function closeMentionDropdown() {
        mentionDropdown.classList.remove('visible');
        mentionStart = -1;
        mentionOnlineCache = null;
      }

      inputMsg.addEventListener('input', function() {
        var pos = inputMsg.selectionStart;
        var val = inputMsg.value;
        var i = val.lastIndexOf('@', pos - 1);
        if (i >= 0 && (i === 0 || /[\s]/.test(val[i-1]))) {
          var filter = val.slice(i + 1, pos).replace(/\s/g, '');
          openMentionDropdown(filter, i);
        } else {
          closeMentionDropdown();
        }
      });

      inputMsg.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.isComposing) {
          if (mentionDropdown.classList.contains('visible') && mentionCandidates.length > 0) {
            e.preventDefault();
            insertMention(mentionCandidates[mentionSelectedIndex]);
            return;
          }
          e.preventDefault();
          sendChat();
          return;
        }
        if (!mentionDropdown.classList.contains('visible')) return;
        if (e.key === 'Escape') { e.preventDefault(); closeMentionDropdown(); return; }
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          mentionSelectedIndex = (mentionSelectedIndex + 1) % Math.max(1, mentionCandidates.length);
          renderMentionDropdown();
          return;
        }
        if (e.key === 'ArrowUp') {
          e.preventDefault();
          mentionSelectedIndex = mentionSelectedIndex <= 0 ? Math.max(0, mentionCandidates.length - 1) : mentionSelectedIndex - 1;
          renderMentionDropdown();
          return;
        }
      });

      inputMsg.addEventListener('blur', function() { setTimeout(closeMentionDropdown, 150); });
    })();
  </script>
</body>
</html>
